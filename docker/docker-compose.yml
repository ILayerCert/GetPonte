##############################################################################
# Ponte POC — Docker Compose
#
# Usage:
#   cd docker/
#   cp .env.example .env   # adjust values if needed
#   docker compose up --build
##############################################################################

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ponte}
      POSTGRES_USER: ${POSTGRES_USER:-ponte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ponte_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ponte}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Go Backend API ----------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ponte}:${POSTGRES_PASSWORD:-ponte_dev_password}@postgres:5432/${POSTGRES_DB:-ponte}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-ponte-dev-secret-change-in-production}
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------- WebRTC Signaling Server ----------
  signaling:
    build:
      context: ../signaling
      dockerfile: Dockerfile
    environment:
      PORT: "4100"
    ports:
      - "4100:4100"

  # ---------- SvelteKit Frontend ----------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://192.168.2.30:8080}
        VITE_WS_URL: ${VITE_WS_URL:-ws://192.168.2.30:8080}
        VITE_SIGNALING_URL: ${VITE_SIGNALING_URL:-ws://192.168.2.30:4100}
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - signaling

volumes:
  pgdata:
